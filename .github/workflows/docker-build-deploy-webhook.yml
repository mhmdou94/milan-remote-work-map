name: Deploy webhook - build and push

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build-deploy-webhook.yml'
      - 'deploy/webhook/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/webhook
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-deploy-webhook:latest
            ghcr.io/${{ github.repository }}-deploy-webhook:sha-${{ github.sha }}
          # See deploy/webhook/README.md - this image doesn't auto-update
          # itself, so a new push here needs a manual pull on the Pi.
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha,scope=deploy-webhook
          cache-to: type=gha,mode=max,scope=deploy-webhook

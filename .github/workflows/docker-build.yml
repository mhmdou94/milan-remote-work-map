name: Docker build and push

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          # linux/amd64+arm64 cover normal Linux/Mac hosts; linux/arm/v7 covers
          # 32-bit Raspberry Pi OS.
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_SHA=${{ github.sha }}
      # Pi pulls the new image and recreates the container via a webhook
      # behind the Cloudflare Tunnel (no inbound ports opened on the Pi).
      # Requires repo secrets DEPLOY_WEBHOOK_URL and DEPLOY_WEBHOOK_TOKEN.
      - name: Trigger Raspberry Pi deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [[ -z "$DEPLOY_WEBHOOK_URL" || -z "$DEPLOY_WEBHOOK_TOKEN" ]]; then
            echo "::warning title=Deploy skipped::DEPLOY_WEBHOOK_URL or DEPLOY_WEBHOOK_TOKEN secret is not set — Pi was not notified"
            exit 0
          fi
          curl --fail --silent --show-error -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
            --max-time 30
